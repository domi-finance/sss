name: Python application CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Build Docker Image
      run: |
        docker build -t robots .
        docker save robots -o ./robots.tar
        chmod 644 ./robots.tar
        ls -la
    
